---
layout: default
---

<div class="dv-page-hero">
  <div class="dv-page-hero__inner">
    <a href="/portfolio/" class="dv-back"><i class="fas fa-arrow-left"></i>&nbsp; Back to Portfolio</a>
    <h1 class="dv-page-hero__title">{{ page.title }}</h1>
  </div>
</div>

<div class="dv-content">
  <div class="dv-content__inner">
    {% if page.image %}
    <img src="{{ page.image }}" alt="{{ page.title }}" class="dv-single-img">
    {% endif %}
    {{ content }}
  </div>
</div>
